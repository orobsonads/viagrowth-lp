<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIA Growth — Marketing Jurídico para Advogados Imobiliários</title>
  <meta name="description" content="A VIA Growth transforma escritórios de advocacia imobiliária em negócios previsíveis, com clientes qualificados chegando todo mês e contratos fechados com consistência." />

  <style>
    /* ─── RESET & BASE ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0A1628;
      --navy2:   #132035;
      --teal:    #00C2FF;
      --teal2:   #0099CC;
      --light:   #F7F8FA;
      --white:   #FFFFFF;
      --gray:    #6B7280;
      --gray2:   #9CA3AF;
      --border:  #E5E7EB;
      --text:    #111827;
      --radius:  12px;
      --shadow:  0 4px 24px rgba(10,22,40,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── NAV ──────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--navy);
      text-decoration: none;
      text-transform: uppercase;
    }

    .logo .via { letter-spacing: 6px; }
    .logo .growth { font-size: 0.62rem; display: block; letter-spacing: 5px; color: var(--gray); margin-top: -3px; font-weight: 400; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--teal);
      color: var(--navy);
      font-weight: 700;
      font-size: 0.92rem;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: var(--teal2); transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--teal);
      color: var(--teal);
    }

    .btn-outline:hover { background: var(--teal); color: var(--white); }

    .btn-lg {
      font-size: 1rem;
      padding: 16px 36px;
      border-radius: 10px;
    }

    /* ─── TAG ──────────────────────────────────────── */
    .tag {
      display: inline-block;
      background: rgba(0,194,255,0.10);
      color: var(--teal2);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    /* ─── HERO ─────────────────────────────────────── */
    .hero {
      background: var(--navy);
      color: var(--white);
      padding: 100px 0 90px;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,194,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero .tag {
      background: rgba(0,194,255,0.15);
      color: var(--teal);
    }

    .hero h1 {
      color: var(--white);
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: -1px;
      max-width: 820px;
      margin: 0 auto 24px;
    }

    .hero h1 em {
      color: var(--teal);
      font-style: normal;
    }

    .hero p {
      font-size: 1.12rem;
      color: rgba(255,255,255,0.72);
      max-width: 580px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    .hero-cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .hero-micro {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.3px;
    }

    /* ─── STATS BAR ────────────────────────────────── */
    .stats-bar {
      background: var(--navy2);
      padding: 40px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .stat-item {
      text-align: center;
      padding: 8px 16px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .stat-item:last-child { border-right: none; }

    .stat-number {
      display: block;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--teal);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3px;
    }

    /* ─── SECTION BASE ─────────────────────────────── */
    section { padding: 96px 0; }
    section.bg-light { background: var(--light); }

    .section-header {
      text-align: center;
      margin-bottom: 64px;
    }

    h2 {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.22;
      letter-spacing: -0.7px;
      color: var(--navy);
    }

    h2 em {
      color: var(--teal);
      font-style: normal;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--gray);
      max-width: 560px;
      margin: 16px auto 0;
      line-height: 1.7;
    }

    /* ─── MARKET SECTION ───────────────────────────── */
    .market-intro {
      max-width: 680px;
      margin: 0 auto 56px;
      text-align: center;
    }

    .market-intro p {
      font-size: 1.05rem;
      color: var(--gray);
      line-height: 1.75;
    }

    .data-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .data-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .data-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(10,22,40,0.12);
    }

    .data-card-number {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--teal);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .data-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .data-card p {
      font-size: 0.9rem;
      color: var(--gray);
      line-height: 1.65;
    }

    /* ─── VIA METHODOLOGY ──────────────────────────── */
    .via-pillars {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .pillar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .pillar-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 32px 36px;
      cursor: pointer;
      user-select: none;
    }

    .pillar-letter {
      width: 64px;
      height: 64px;
      min-width: 64px;
      background: var(--navy);
      color: var(--teal);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .pillar-title-group { flex: 1; }

    .pillar-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.4px;
    }

    .pillar-subtitle {
      font-size: 0.9rem;
      color: var(--gray);
      margin-top: 3px;
      font-style: italic;
    }

    .pillar-arrow {
      font-size: 1.4rem;
      color: var(--teal);
      transition: transform 0.3s;
    }

    .pillar.open .pillar-arrow { transform: rotate(180deg); }

    .pillar-body {
      display: none;
      padding: 0 36px 36px;
      border-top: 1px solid var(--border);
    }

    .pillar.open .pillar-body { display: block; }

    .pillar-items {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 28px;
      margin-bottom: 28px;
    }

    .pillar-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .pillar-icon {
      width: 8px;
      height: 8px;
      min-width: 8px;
      background: var(--teal);
      border-radius: 50%;
      margin-top: 8px;
    }

    .pillar-item-text strong {
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
    }

    .pillar-item-text span {
      font-size: 0.85rem;
      color: var(--gray);
      line-height: 1.55;
    }

    .pillar-quote {
      background: var(--light);
      border-left: 3px solid var(--teal);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      font-size: 0.95rem;
      color: var(--navy2);
      font-style: italic;
      line-height: 1.6;
    }

    .via-anchor {
      margin-top: 56px;
      background: var(--navy);
      border-radius: var(--radius);
      padding: 40px 48px;
      text-align: center;
    }

    .via-anchor p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      max-width: 680px;
      margin: 0 auto 28px;
    }

    .via-anchor p strong { color: var(--teal); }

    /* ─── RESULTADOS / PROCESSO ────────────────────── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 48px;
    }

    .result-card {
      text-align: center;
      padding: 48px 24px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .result-number {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .result-number span { color: var(--teal); }

    .result-label {
      font-size: 0.9rem;
      color: var(--gray);
      line-height: 1.5;
    }

    .results-footnote {
      text-align: center;
      font-size: 1rem;
      color: var(--gray);
      font-style: italic;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ─── BIO ──────────────────────────────────────── */
    .bio-wrapper {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 64px;
      align-items: center;
    }

    .bio-tag { margin-bottom: 16px; }

    .bio-name {
      font-size: 2rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .bio-text {
      font-size: 1rem;
      color: var(--gray);
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .bio-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .badge {
      background: var(--light);
      border: 1px solid var(--border);
      color: var(--navy);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .bio-image-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--navy);
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bio-image-placeholder {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      padding: 32px;
    }

    .bio-image-placeholder svg {
      display: block;
      margin: 0 auto 12px;
      opacity: 0.4;
    }

    /* ─── FAQ ──────────────────────────────────────── */
    .faq-list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .faq-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--white);
    }

    .faq-question {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--navy);
      transition: background 0.15s;
    }

    .faq-question:hover { background: var(--light); }

    .faq-chevron {
      font-size: 1.1rem;
      color: var(--teal);
      transition: transform 0.3s;
      min-width: 20px;
    }

    .faq-item.open .faq-chevron { transform: rotate(180deg); }

    .faq-answer {
      display: none;
      padding: 0 24px 22px;
      font-size: 0.93rem;
      color: var(--gray);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    .faq-item.open .faq-answer { display: block; }

    /* ─── CTA FINAL ────────────────────────────────── */
    .cta-section {
      background: var(--navy);
      color: var(--white);
      padding: 96px 0;
    }

    .cta-section .tag {
      background: rgba(0,194,255,0.15);
      color: var(--teal);
    }

    .cta-inner {
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 80px;
      align-items: start;
    }

    .cta-left h2 {
      color: var(--white);
      margin-bottom: 16px;
    }

    .cta-left h2 em { color: var(--teal); }

    .cta-left p {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .trust-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.65);
    }

    .trust-dot {
      width: 8px;
      height: 8px;
      min-width: 8px;
      background: var(--teal);
      border-radius: 50%;
    }

    .form-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }

    .form-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .form-card p {
      font-size: 0.85rem;
      color: var(--gray);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.93rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--teal);
    }

    .form-group input::placeholder { color: var(--gray2); }

    .btn-form {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
      font-size: 1rem;
      padding: 15px;
    }

    .form-micro {
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray2);
      margin-top: 10px;
    }

    /* ─── SUCCESS MESSAGE ──────────────────────────── */
    #form-success {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(0, 194, 255, 0.1);
      color: var(--teal);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
    }

    #form-success h4 {
      font-size: 1.4rem;
      color: var(--navy);
      margin-bottom: 12px;
    }

    #form-success p {
      color: var(--gray);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 0;
    }

    /* ─── FOOTER ───────────────────────────────────── */
    footer {
      background: #060E1B;
      color: rgba(255,255,255,0.35);
      text-align: center;
      padding: 28px 24px;
      font-size: 0.82rem;
    }

    footer a { color: rgba(255,255,255,0.45); text-decoration: none; }
    footer a:hover { color: var(--teal); }

    /* ─── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-item:nth-child(2) { border-right: none; }
      .stat-item:nth-child(3) { border-right: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.08); }
      .stat-item:nth-child(4) { border-right: none; border-top: 1px solid rgba(255,255,255,0.08); }
      .data-cards { grid-template-columns: 1fr; }
      .pillar-items { grid-template-columns: 1fr; }
      .results-grid { grid-template-columns: 1fr; gap: 16px; }
      .bio-wrapper { grid-template-columns: 1fr; }
      .bio-image-wrap { max-width: 360px; margin: 0 auto; }
